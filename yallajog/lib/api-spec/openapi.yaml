openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Running Trainer App API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: trainees
    description: Trainee management
  - name: segments
    description: Segment library
  - name: week-plans
    description: Week planning
  - name: transactions
    description: Financial transactions
  - name: announcements
    description: Trainer announcements
  - name: events
    description: Race and event management
  - name: dashboard
    description: Dashboard summaries

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ──────────────── TRAINEES ────────────────
  /trainees:
    get:
      operationId: listTrainees
      tags: [trainees]
      summary: List all trainees
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: planType
          in: query
          schema:
            type: string
            enum: [free, paid]
        - name: planned
          in: query
          schema:
            type: boolean
        - name: hasBalance
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of trainees
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Trainee"
    post:
      operationId: createTrainee
      tags: [trainees]
      summary: Create a trainee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTraineeInput"
      responses:
        "201":
          description: Created trainee
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trainee"

  /trainees/{id}:
    get:
      operationId: getTrainee
      tags: [trainees]
      summary: Get a trainee by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Trainee
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trainee"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateTrainee
      tags: [trainees]
      summary: Update a trainee
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTraineeInput"
      responses:
        "200":
          description: Updated trainee
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trainee"
    delete:
      operationId: deleteTrainee
      tags: [trainees]
      summary: Delete a trainee
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /trainees/{id}/contract:
    get:
      operationId: getTraineeContract
      tags: [trainees]
      summary: Get trainee contract
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Trainee contract
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contract"
    put:
      operationId: updateTraineeContract
      tags: [trainees]
      summary: Update trainee contract
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContractInput"
      responses:
        "200":
          description: Updated contract
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contract"

  # ──────────────── TRANSACTIONS ────────────────
  /trainees/{id}/transactions:
    get:
      operationId: listTraineeTransactions
      tags: [transactions]
      summary: List transactions for a trainee
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"
    post:
      operationId: createTransaction
      tags: [transactions]
      summary: Add a transaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTransactionInput"
      responses:
        "201":
          description: Created transaction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"

  /trainees/{id}/transactions/{txId}:
    delete:
      operationId: deleteTransaction
      tags: [transactions]
      summary: Delete a transaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: txId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ──────────────── SEGMENTS ────────────────
  /segments:
    get:
      operationId: listSegments
      tags: [segments]
      summary: List all segments
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of segments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Segment"
    post:
      operationId: createSegment
      tags: [segments]
      summary: Create a segment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSegmentInput"
      responses:
        "201":
          description: Created segment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Segment"

  /segments/{id}:
    get:
      operationId: getSegment
      tags: [segments]
      summary: Get a segment by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Segment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Segment"
    put:
      operationId: updateSegment
      tags: [segments]
      summary: Update a segment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSegmentInput"
      responses:
        "200":
          description: Updated segment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Segment"
    delete:
      operationId: deleteSegment
      tags: [segments]
      summary: Delete a segment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /segment-types:
    get:
      operationId: listSegmentTypes
      tags: [segments]
      summary: List all segment types
      responses:
        "200":
          description: List of segment types
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SegmentType"
    post:
      operationId: createSegmentType
      tags: [segments]
      summary: Create a segment type
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSegmentTypeInput"
      responses:
        "201":
          description: Created segment type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SegmentType"

  /segment-types/{id}:
    put:
      operationId: updateSegmentType
      tags: [segments]
      summary: Update a segment type
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSegmentTypeInput"
      responses:
        "200":
          description: Updated segment type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SegmentType"
    delete:
      operationId: deleteSegmentType
      tags: [segments]
      summary: Delete a segment type
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ──────────────── WEEK PLANS ────────────────
  /week-plans:
    get:
      operationId: listWeekPlans
      tags: [week-plans]
      summary: List week plans
      parameters:
        - name: traineeId
          in: query
          schema:
            type: integer
        - name: weekStart
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: List of week plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WeekPlan"
    post:
      operationId: createWeekPlan
      tags: [week-plans]
      summary: Create a week plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWeekPlanInput"
      responses:
        "201":
          description: Created week plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeekPlan"

  /week-plans/{id}:
    get:
      operationId: getWeekPlan
      tags: [week-plans]
      summary: Get a week plan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Week plan with runs and segments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeekPlanDetail"
    put:
      operationId: updateWeekPlan
      tags: [week-plans]
      summary: Update a week plan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWeekPlanInput"
      responses:
        "200":
          description: Updated week plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeekPlan"
    delete:
      operationId: deleteWeekPlan
      tags: [week-plans]
      summary: Delete a week plan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /week-plans/{id}/runs:
    post:
      operationId: addRunToWeekPlan
      tags: [week-plans]
      summary: Add a run to a week plan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRunInput"
      responses:
        "201":
          description: Created run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Run"

  /week-plans/{id}/runs/{runId}:
    put:
      operationId: updateRun
      tags: [week-plans]
      summary: Update a run
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: runId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRunInput"
      responses:
        "200":
          description: Updated run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Run"
    delete:
      operationId: deleteRun
      tags: [week-plans]
      summary: Delete a run
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: runId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ──────────────── ANNOUNCEMENTS ────────────────
  /announcements:
    get:
      operationId: listAnnouncements
      tags: [announcements]
      summary: List all announcements
      responses:
        "200":
          description: List of announcements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Announcement"
    post:
      operationId: createAnnouncement
      tags: [announcements]
      summary: Create an announcement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAnnouncementInput"
      responses:
        "201":
          description: Created announcement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Announcement"

  /announcements/{id}:
    put:
      operationId: updateAnnouncement
      tags: [announcements]
      summary: Update an announcement
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAnnouncementInput"
      responses:
        "200":
          description: Updated announcement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Announcement"
    delete:
      operationId: deleteAnnouncement
      tags: [announcements]
      summary: Delete an announcement
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ──────────────── EVENTS ────────────────
  /events:
    get:
      operationId: listEvents
      tags: [events]
      summary: List all events
      responses:
        "200":
          description: List of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"
    post:
      operationId: createEvent
      tags: [events]
      summary: Create an event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEventInput"
      responses:
        "201":
          description: Created event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"

  /events/{id}:
    put:
      operationId: updateEvent
      tags: [events]
      summary: Update an event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEventInput"
      responses:
        "200":
          description: Updated event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
    delete:
      operationId: deleteEvent
      tags: [events]
      summary: Delete an event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ──────────────── DASHBOARD ────────────────
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get trainer dashboard summary
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/trainees-needing-attention:
    get:
      operationId: getTraineesNeedingAttention
      tags: [dashboard]
      summary: Trainees needing feedback, inactive, or with balance due
      responses:
        "200":
          description: Attention lists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TraineesAttentionSummary"

  /trainees/{id}/current-week-plan:
    get:
      operationId: getTraineeCurrentWeekPlan
      tags: [week-plans]
      summary: Get the current week plan for a trainee (used by trainee app)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Current week plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeekPlanDetail"
        "404":
          description: No plan for current week

  /trainees/{id}/balance:
    get:
      operationId: getTraineeBalance
      tags: [transactions]
      summary: Get trainee balance summary
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Balance summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BalanceSummary"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    # ─── TRAINEE ───
    Trainee:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        city:
          type: string
        birthdate:
          type: string
          format: date
        runsPerWeek:
          type: integer
        hrZone4:
          type: integer
        hrZone5a:
          type: integer
        hrZone5c:
          type: integer
        targetHr:
          type: integer
        targetSpeedFrom:
          type: string
        targetSpeedTo:
          type: string
        testDate:
          type: string
          format: date
        lactateThresholdHr:
          type: integer
        preferredPayment:
          type: string
          enum: [cash, credit_card]
        planType:
          type: string
          enum: [free, paid]
        planFinishDate:
          type: string
          format: date
        monthlyFee:
          type: number
        balanceDue:
          type: number
        hasActivityThisWeek:
          type: boolean
        isPlannedThisWeek:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - planType
        - createdAt

    CreateTraineeInput:
      type: object
      properties:
        name:
          type: string
        city:
          type: string
        birthdate:
          type: string
          format: date
        runsPerWeek:
          type: integer
        hrZone4:
          type: integer
        hrZone5a:
          type: integer
        hrZone5c:
          type: integer
        targetHr:
          type: integer
        targetSpeedFrom:
          type: string
        targetSpeedTo:
          type: string
        testDate:
          type: string
          format: date
        lactateThresholdHr:
          type: integer
        preferredPayment:
          type: string
          enum: [cash, credit_card]
        planType:
          type: string
          enum: [free, paid]
        planFinishDate:
          type: string
          format: date
        monthlyFee:
          type: number
      required:
        - name
        - planType

    # ─── CONTRACT ───
    Contract:
      type: object
      properties:
        id:
          type: integer
        traineeId:
          type: integer
        preferredPayment:
          type: string
          enum: [cash, credit_card]
        planType:
          type: string
          enum: [free, paid]
        planFinishDate:
          type: string
          format: date
        monthlyFee:
          type: number
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - traineeId
        - planType

    ContractInput:
      type: object
      properties:
        preferredPayment:
          type: string
          enum: [cash, credit_card]
        planType:
          type: string
          enum: [free, paid]
        planFinishDate:
          type: string
          format: date
        monthlyFee:
          type: number
      required:
        - planType

    # ─── TRANSACTION ───
    Transaction:
      type: object
      properties:
        id:
          type: integer
        traineeId:
          type: integer
        date:
          type: string
          format: date
        amount:
          type: number
        activityMonth:
          type: string
        method:
          type: string
          enum: [cash, credit_card, online]
        notes:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - traineeId
        - date
        - amount
        - activityMonth
        - createdAt

    CreateTransactionInput:
      type: object
      properties:
        date:
          type: string
          format: date
        amount:
          type: number
        activityMonth:
          type: string
        method:
          type: string
          enum: [cash, credit_card, online]
        notes:
          type: string
      required:
        - date
        - amount
        - activityMonth

    BalanceSummary:
      type: object
      properties:
        traineeId:
          type: integer
        totalCharged:
          type: number
        totalPaid:
          type: number
        balance:
          type: number
        monthlyFee:
          type: number
      required:
        - traineeId
        - totalCharged
        - totalPaid
        - balance

    # ─── SEGMENT TYPE ───
    SegmentType:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
      required:
        - id
        - name

    CreateSegmentTypeInput:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
      required:
        - name

    # ─── SEGMENT ───
    Segment:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        type:
          type: string
        typeId:
          type: integer
        template:
          type: string
        description:
          type: string
        isPersonal:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - type
        - template
        - createdAt

    CreateSegmentInput:
      type: object
      properties:
        name:
          type: string
        typeId:
          type: integer
        template:
          type: string
        description:
          type: string
        isPersonal:
          type: boolean
      required:
        - name
        - template

    # ─── WEEK PLAN ───
    WeekPlan:
      type: object
      properties:
        id:
          type: integer
        traineeId:
          type: integer
        traineeName:
          type: string
        weekStart:
          type: string
          format: date
        notes:
          type: string
        runsCount:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - traineeId
        - weekStart
        - createdAt

    CreateWeekPlanInput:
      type: object
      properties:
        traineeId:
          type: integer
        weekStart:
          type: string
          format: date
        notes:
          type: string
      required:
        - traineeId
        - weekStart

    Run:
      type: object
      properties:
        id:
          type: integer
        weekPlanId:
          type: integer
        name:
          type: string
        runType:
          type: string
        order:
          type: integer
        segments:
          type: array
          items:
            $ref: "#/components/schemas/RunSegment"
      required:
        - id
        - weekPlanId
        - runType
        - order

    CreateRunInput:
      type: object
      properties:
        name:
          type: string
        runType:
          type: string
        order:
          type: integer
        segments:
          type: array
          items:
            $ref: "#/components/schemas/RunSegmentInput"
      required:
        - runType
        - order

    RunSegment:
      type: object
      properties:
        id:
          type: integer
        runId:
          type: integer
        segmentId:
          type: integer
        segmentName:
          type: string
        segmentTemplate:
          type: string
        resolvedText:
          type: string
        order:
          type: integer
      required:
        - id
        - runId
        - order
        - resolvedText

    RunSegmentInput:
